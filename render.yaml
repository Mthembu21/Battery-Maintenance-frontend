services:
  - type: web
    name: battery-maintenance-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://battery-maintenance-backend.onrender.com/api

    autoDeploy: true