services:
  - type: web
    name: battery-maintenance-frontend
    env: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - src/**
        - public/**
        - package.json
        - vite.config.js
        - index.html
    envVars:
      - key: VITE_API_URL
        value: https://battery-maintenance-backend.onrender.com/api
    autoDeploy: true
