services:
  - type: web
    name: battery-maintenance-frontend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    buildFilter:
      paths:
        - src/**
        - public/**
        - package.json
        - server.js
        - vite.config.js
        - index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://battery-maintenance-backend.onrender.com/api
    autoDeploy: true
